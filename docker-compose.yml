services:
  postgres:
    image: postgres:16
    container_name: syncbridge-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  source-mock-api:
    build:
      context: .
      dockerfile: src/SyncBridge.SourceMockApi/Dockerfile
    container_name: syncbridge-source-mock-api
    ports:
      - "5001:8080"

  syncbridge-worker:
    build:
      context: .
      dockerfile: src/SyncBridge.Worker/Dockerfile
    container_name: syncbridge-worker
    depends_on:
      - postgres
      - source-mock-api
    environment:
      ConnectionStrings__TargetDb: Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      SourceApi__BaseUrl: http://source-mock-api:8080
      SourceApi__PageSize: 5
      SourceApi__TimeoutSeconds: 30
      Sync__IntervalSeconds: 20
      Sync__JobName: product-sync
      Sync__MaxRetries: 3
      Sync__RetryDelayMilliseconds: 1000

  syncbridge-admin-api:
    build:
      context: .
      dockerfile: src/SyncBridge.AdminApi/Dockerfile
    container_name: syncbridge-admin-api
    depends_on:
      - postgres
    ports:
      - "5002:8080"
    environment:
      ConnectionStrings__TargetDb: Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}